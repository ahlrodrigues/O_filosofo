
name: O Filosofia

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  postar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
          BOT_MODE: ${{ secrets.BOT_MODE }}
          MASTODON_VISIBILITY: ${{ secrets.MASTODON_VISIBILITY }}
          QUOTES_FILE: ${{ secrets.QUOTES_FILE }}
          TAG_PT_BR: ${{ secrets.TAG_PT_BR }}
          TAG_EN: ${{ secrets.TAG_EN }}
        run: python bot_mastodon_filosofia.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json
          git diff --cached --quiet || git commit -m "Atualiza estado das frases"

      - name: Push state
        run: git push
